<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hole Particle System - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #instruction {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="instruction">Click para generar un Agujero Negro</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURACIÓN DE ESCENA ---
        const scene = new THREE.Scene();
        // Niebla suave para dar profundidad y ocultar partículas lejanas
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 100, 150);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimización de rendimiento
        document.body.appendChild(renderer.domElement);

        // --- SISTEMA DE PARTÍCULAS ---
        const PARTICLE_COUNT = 20000;
        const GRID_SIZE = 250; // Área de distribución inicial
        
        // Geometría Buffer para máximo rendimiento
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3); // Almacén de física CPU

        // Inicialización en Rejilla (Grid)
        const cols = Math.ceil(Math.sqrt(PARTICLE_COUNT));
        const step = GRID_SIZE / cols;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // Cálculo de grid x, z
            const row = Math.floor(i / cols);
            const col = i % cols;

            const x = (col * step) - (GRID_SIZE / 2);
            const z = (row * step) - (GRID_SIZE / 2);
            
            // Posición inicial
            positions[i * 3] = x;
            positions[i * 3 + 1] = 0; // Plano Y=0
            positions[i * 3 + 2] = z;

            // Velocidad inicial (quietos)
            velocities[i * 3] = 0;
            velocities[i * 3 + 1] = 0;
            velocities[i * 3 + 2] = 0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // Material: AdditiveBlending es clave para el efecto de luz
        const material = new THREE.PointsMaterial({
            color: 0x00ffff,     // Cyan eléctrico
            size: 0.8,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false    // Importante para transparencia correcta
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- LÓGICA DE INTERACCIÓN Y FÍSICA ---
        
        // Estado del sistema
        const blackHole = {
            active: false,
            x: 0,
            z: 0,
            mass: 1500 // Fuerza de atracción
        };

        // Raycaster para detectar posición en el plano del suelo
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // Plano infinito en Y=0

        window.addEventListener('pointerdown', (event) => {
            // Normalizar coordenadas del mouse (-1 a +1)
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const target = new THREE.Vector3();
            
            // Intersectar con el plano matemático (más eficiente que intersectar malla)
            raycaster.ray.intersectPlane(plane, target);

            if (target) {
                blackHole.active = true;
                blackHole.x = target.x;
                blackHole.z = target.z;
                
                // Efecto visual: cambiar color al activar
                material.color.setHex(0xff0055); // Cambia a magenta al activar
            }
        });

        // --- BUCLE DE ANIMACIÓN ---
        
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1); // Clamp delta para evitar saltos grandes

            if (blackHole.active) {
                const positionsAttr = geometry.attributes.position;
                
                // Accedemos a los arrays tipados directamente para velocidad
                // No usamos Vector3 por partícula para evitar Garbage Collection masivo
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const idx = i * 3;
                    
                    let px = positionsAttr.array[idx];
                    let pz = positionsAttr.array[idx + 2];
                    
                    // Vector distancia (Destino - Origen)
                    const dx = blackHole.x - px;
                    const dz = blackHole.z - pz;
                    
                    // Distancia cuadrada (evitamos raíz cuadrada costosa al principio)
                    const distSq = dx * dx + dz * dz;
                    
                    // Física: Gravedad
                    // F = G * (m1*m2) / r^2
                    // Limitamos la distancia mínima (clamp) para evitar fuerza infinita si r -> 0
                    // Esto crea el "Caos Gravitatorio" en el centro: una fuerza repulsiva de "funda"
                    const safeDistSq = Math.max(distSq, 5.0); 
                    const force = blackHole.mass / safeDistSq;

                    // Distancia real para normalización
                    const dist = Math.sqrt(safeDistSq);

                    // Vectores Normalizados
                    const nx = dx / dist; // Dirección X hacia el centro
                    const nz = dz / dist; // Dirección Z hacia el centro

                    // 1. FUERZA DE ATRACCIÓN (Centrípeta)
                    velocities[idx] += nx * force * delta;
                    velocities[idx + 2] += nz * force * delta;

                    // 2. COMPONENTE ORBITAL (Tangencial / Producto Cruz)
                    // Si estuviéramos en 3D completo, sería Cross(Up, Dir).
                    // En 2D (XZ), el vector perpendicular a (x, z) es (-z, x).
                    // Añadimos esto para crear el remolino. Cuanto más cerca, más rápido giran.
                    const tangentStrength = 80.0; // Fuerza del remolino
                    
                    // Aplicamos fuerza tangencial inversamente proporcional a la distancia (conservación momento angular aprox)
                    const orbitForce = tangentStrength / dist;
                    
                    velocities[idx] += -nz * orbitForce * delta; // Perpendicular X
                    velocities[idx + 2] += nx * orbitForce * delta; // Perpendicular Z

                    // 3. INTEGRACIÓN DE POSICIÓN
                    // Aplicamos fricción leve para que el sistema sea estable pero perpetuo
                    velocities[idx] *= 0.995; 
                    velocities[idx + 2] *= 0.995;

                    px += velocities[idx] * delta;
                    pz += velocities[idx + 2] * delta;

                    // Actualizar buffer
                    positionsAttr.array[idx] = px;
                    positionsAttr.array[idx + 2] = pz;
                    
                    // Opcional: Variación leve en Y para dar volumen al caos
                    // Las partículas cerca del centro "vibran" verticalmente
                    if (dist < 20) {
                         positionsAttr.array[idx + 1] = (Math.random() - 0.5) * (20 - dist) * 0.5;
                    } else {
                        positionsAttr.array[idx + 1] *= 0.9; // Regresan al suelo lentamente
                    }
                }
                
                // Marcar geometría para actualización en GPU
                positionsAttr.needsUpdate = true;
                
                // Rotación leve de cámara para dinamismo
                scene.rotation.y += 0.001;
            }

            renderer.render(scene, camera);
        }

        // --- MANEJO DE REDIMENSIONAMIENTO ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
